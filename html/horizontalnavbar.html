
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>horizontal navbar</title>
    <style>
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:1rem 2rem;
            background:#1e1e1e;
            color:white;

        }
        .nav-links{
            display:flex;
            gap:1.5rem;
            list-style:none;
            margin:0;
            padding:0;
        }
        .nav-links a{
            color:white;
            text-decoration:none;
        }
    </style>
</head>
<body>
   <nav class="navbar">
    <div class="logo">mysite </div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">services</a></li>
        <li><a href="#">contact</a></li>
    </ul>
   </nav>
    
</body>
</html>
