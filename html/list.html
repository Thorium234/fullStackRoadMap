
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- unorderd list  has bullets-->
    <ul>
        <li>milk</li>
        <li>bread</li>
        <li>eggs</li>
        <li>millet</li>
        
    </ul>
    <!-- ordered list has numbers  -->
     <ol start="5">
        <li>boil water</li>
        <li>put tea bag</li>
        <li>pour water</li>
        <li>wait for 3 minutes</li>
        
    </ol>
    <!-- change numbering using `type` key word eg  -->
     <!-- 
    <ol type="A"> for ABC
    <ol type="a"> for abc
    <ol type="i"> for romans
    <ol start="5"> for start at 5            
     -->
    
     <!-- descriptive list -->
      <dl>
        <dt>HTML</dt>
        <dd>this is a makeup language</dd>
        <dt>CSS</dt>
        <dd>styling language</dd>
        <dt>javascript</dt>
        <dd>makes pages interactive</dd>
</body>
</html>
