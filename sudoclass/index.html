<!DOCTYPE>
<html>
    <head>
        <title>pseudo-classes</title>
        <style>
            .btn{
                background-color:#4caf50;
                color:white;
                padding:10px 20px;
                border: none;
                cursor: pointer;

            }
            .btn:hover{
                background-color: red;
            }
            .btn:active{
                background-color: blue;
            }
        </style>
    </head>
    <body>
        <button class="btn">
            clickMe!
        </button>
    </body>

</html>
