
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>horizontal navbar</title>
    <style>
        body{
            display:flex;
            margin:0;
        }
        .sidebar{
            display:flex;
            flex-direction:column;
            justify-content:flex-start;
            gap:2rem;
            width:220px;
            height:100vh;
            padding:2rem 1rem;
            background:#1e1e1e;
            color: white;
            position:fixed;
        }
        .sidebar .navlinks{
            display:flex;
            flex-direction:column;
            gap:1rem;
            list-style:none;
            padding:0;
            margin:0;
            width:100%;

        }
        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:0.5rem;
        }
        .sidebar a:hover{
            background:#333;
            border-radius:4px;
        }
        .content{
            flex:1;
            padding:2rem;
        }
    </style>
</head>
<body>
   <nav class="sidebar">
    <div class="logo">mysite </div>
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">services</a></li>
        <li><a href="#">contact</a></li>
    </ul>
   </nav>
   <main class="content">
    main content
   </main>
    
</body>
</html>
