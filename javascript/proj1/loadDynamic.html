<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Typing Spinner</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #2c3e50, #4a6572);
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      position: relative;
      animation: spin 1.5s linear infinite;
      margin-bottom: 30px;
    }

    .spinner::before,
    .spinner::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid transparent;
    }

    .spinner::before {
      border-top-color: red;
      border-right-color: green;
    }

    .spinner::after {
      border-bottom-color: black;
      border-left-color: white;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .text-container {
      color: white;
      font-size: clamp(1rem, 4vw, 2rem);
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      max-width: 90%;
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>
<h1>thorium</h1>
  <div class="spinner"></div>
  <div class="text-container">
    <p>Code is running: <span id="dynamic-text"></span></p>
  </div>

  <script>
    const words = ['function', 'callback', 'promise', 'async', 'await', 'fetch', 'JSON', 'array', 'object', 'closure'];
    const textElement = document.getElementById('dynamic-text');
    
    async function typeWord(word) {
      for (const char of word) {
        textElement.textContent += char;
        await new Promise(r => setTimeout(r, 100));
      }
      await new Promise(r => setTimeout(r, 1000));
      for (let i = word.length; i > 0; i--) {
        textElement.textContent = word.substring(0, i - 1);
        await new Promise(r => setTimeout(r, 50));
      }
    }

    async function loop() {
      while (true) {
        const randomWord = words[Math.floor(Math.random() * words.length)];
        await typeWord(randomWord);
      }
    }

    loop();
  </script>
</body>
</html>
