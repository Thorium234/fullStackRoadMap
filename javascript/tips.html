<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>reverse string</title>
</head>
<body>
  <h1>Hello, World!</h1>

  <input id="strInput" type="text" placeholder="enter a string" />
  <button id="reverseBtn">Reverse String</button>

  <p id="result" aria-live="polite"></p>


  <script>
    const strInput = document.getElementById('strInput');
    const reverseBtn = document.getElementById('reverseBtn');
    const resultEl = document.getElementById('result');

    reverseBtn.addEventListener('click', () => {
      const str = String(strInput.value);
      const reversed = str.split('').reverse().join('');
      resultEl.textContent = `Reversed string: ${reversed}`;
    });

    //reverse string
    let alpha = 'Hello, World!';
    let reversed = alpha.split('').reverse().join('');
    console.log(reversed); // Output: !dlroW ,olleH

    //fixing capitalization
    let name = 'john doe';
    let capitalized =name[0].toUpperCase() + name.slice(1).toLowerCase();
    console.log(capitalized); // Output: John doe

    //making string from older string
    let old = 'man6752526272&2635;throriun djdj ';
    let code = old.slice(0,3);
    let semicolonIndex = old.indexOf(';');
    let number = old.slice( semicolonIndex+1); 
    let newString = code + number;
    console.log(newString); // Output: man2635

    //find out xmass messages\
    let message = 'Merry Christmas and Happy New Year!';
    if (message.toLowerCase().includes('christmas')) {
      console.log('The message contains Christmas wishes!');
    } else {
      console.log('The message does not contain Christmas wishes.');
    }
 
  </script>
</body>
</html>
