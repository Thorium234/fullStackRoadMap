<html lang="en">
<head>
    <style>
        .solid1 {
            border-width: 5px;
            border-style: solid;
            border-color: red;
        }
        .solid2 {
            border-width: thin; /* thin || medium || thick */
            border-style: solid;
            border-color: #FF0000;
        }
    </style>
</head>
<body>
    <p class="solid1">Solid border 1</p>
    <p class="solid2">Solid border 2</p>
</body>
</html>
