<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display Inline-Block Example</title>
  <style>
    body{
      min-height: 800px;
      display:flex;
       justify-content: space-evenly;/*centre a div*/
      border: 8px solid black;
      align-items: center;/*align items to the end of the container*/
     /* you can use display flex,justify content centre and
     allign items centre to centre a div */
    }
    .demo {
     
      background-color: rgb(19, 74, 224);
      width: 200px;
      height: 200px;
      margin: 5px;
      text-align: center;
      line-height: 50px;
      font-size: 40pt;
    }
  </style>
</head>
<body>
  
  <div class="demo">Box 1</div>
  <div class="demo">Box 2</div>
  <div class="demo">Box 3</div>
  <div class="demo">Box 4</div
  <div class="demo">Box 5</div>
  
</body>
</html>
