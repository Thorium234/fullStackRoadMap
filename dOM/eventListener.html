<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoM intergration</title>
   
</head>
<body>
    <h2 id="myText">
        click to change

    </h2>
    <p id="message" >another text</p>
    <button  onclick="changeText()">Change Text</button>
    <button id="changeButton">Change Text with Event Listener</button>
    
     <script>
        function changeText(){
            document.getElementById("myText").innerHTML = "Text changed!";
        }
        let messageElement = document.getElementById("message");
        let changeBtn = document.getElementById("changeButton");

        changeBtn.addEventListener("click", function() {
            messageElement.textContent = "Text changed by event listener!";
        });
    </script>
</body>
</html>
